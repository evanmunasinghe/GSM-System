openapi: 3.1.0
info:
  title: ANT ERP - GSM Integration API
  version: 1.0.0
  summary: Contract for exchanging master data and sales transactions between ANT ERP and GSM.
  description: |
    Proposed integration contract. These operations are not implemented by the current
    GSM application yet.

    ANT ERP is the system of record for customers, vendors, employees, inquiries,
    quotations, orders, invoices, and dispatches. ANT pushes those records to GSM by
    using idempotent PUT operations or the batch synchronization operation. GSM stores
    ANT identifiers as external identifiers and sends GSM-originated workshop events
    to ANT through the webhooks defined in this document.

    Integration rules:
      * Every request is tenant-scoped. The token tenant and path tenant must match.
      * ANT IDs are opaque strings and must not be converted to GSM database IDs.
      * PUT is an upsert and is safe to retry with the same Idempotency-Key.
      * source_updated_at is used for conflict detection; the newest accepted source
        version wins. Older versions receive HTTP 409.
      * Monetary amounts are decimal strings to avoid floating-point rounding errors.
      * Dates and timestamps use ISO 8601. Timestamps should be sent in UTC.
      * Deletions are soft deletions represented by active=false or deleted_at.
  contact:
    name: ANT / GSM Integration Team
  license:
    name: Proprietary
servers:
  - url: https://{tenant}.gsm.example.com/api
    description: GSM production tenant API (replace with the deployed GSM domain)
    variables:
      tenant:
        default: demo
  - url: http://{tenant}.localhost/api
    description: Local GSM tenant API
    variables:
      tenant:
        default: demo
security:
  - oauth2ClientCredentials:
      - integration:read
      - integration:write
tags:
  - name: Integration
  - name: Customers
  - name: Vendors
  - name: Employees
  - name: Vehicles
  - name: Inquiries
  - name: Quotations
  - name: Orders
  - name: Invoices
  - name: Dispatches

paths:
  /integration/v1/health:
    get:
      tags: [Integration]
      summary: Check GSM integration availability
      operationId: getIntegrationHealth
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          description: Integration service is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integration/v1/tenants/{tenantId}/sync:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    post:
      tags: [Integration]
      summary: Synchronize multiple ANT records in one request
      description: |
        Accepts up to 100 records. Records are processed independently. A successful
        HTTP response can contain rejected individual records, so the caller must inspect
        every item in results.
      operationId: synchronizeAntRecords
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSyncRequest'
      responses:
        '200':
          description: Batch processed; inspect each result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/customers/{antCustomerId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AntCustomerId'
    get:
      tags: [Customers]
      summary: Get an ANT-managed customer from GSM
      operationId: getCustomer
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          $ref: '#/components/responses/CustomerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Customers]
      summary: Create or replace an ANT-managed customer in GSM
      operationId: upsertCustomer
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerWrite'
      responses:
        '200':
          $ref: '#/components/responses/CustomerResponse'
        '201':
          $ref: '#/components/responses/CustomerCreatedResponse'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/vendors/{antVendorId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AntVendorId'
    get:
      tags: [Vendors]
      summary: Get an ANT-managed vendor from GSM
      operationId: getVendor
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          $ref: '#/components/responses/VendorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Vendors]
      summary: Create or replace an ANT-managed vendor in GSM
      operationId: upsertVendor
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorWrite'
      responses:
        '200':
          $ref: '#/components/responses/VendorResponse'
        '201':
          $ref: '#/components/responses/VendorCreatedResponse'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/employees/{antEmployeeId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AntEmployeeId'
    get:
      tags: [Employees]
      summary: Get an ANT-managed employee from GSM
      operationId: getEmployee
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          $ref: '#/components/responses/EmployeeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Employees]
      summary: Create or replace an ANT-managed employee in GSM
      operationId: upsertEmployee
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
