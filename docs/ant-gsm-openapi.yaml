      responses:
        '200':
          $ref: '#/components/responses/EmployeeResponse'
        '201':
          $ref: '#/components/responses/EmployeeCreatedResponse'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/vehicles/{antVehicleId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AntVehicleId'
    get:
      tags: [Vehicles]
      summary: Get a vehicle linked to ANT
      operationId: getVehicle
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          $ref: '#/components/responses/VehicleResponse'
        '404':
