    put:
      tags: [Vehicles]
      summary: Create or replace an ANT-linked vehicle in GSM
      operationId: upsertVehicle
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleWrite'
      responses:
        '200':
          $ref: '#/components/responses/VehicleResponse'
        '201':
          $ref: '#/components/responses/VehicleCreatedResponse'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/inquiries/{antInquiryId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/AntInquiryId'
    get:
      tags: [Inquiries]
      summary: Get an inquiry mirrored from ANT
      operationId: getInquiry
      security:
        - oauth2ClientCredentials: [integration:read]
      responses:
        '200':
          description: Inquiry found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Inquiries]
      summary: Create or replace an inquiry mirror in GSM
      operationId: upsertInquiry
      security:
        - oauth2ClientCredentials: [integration:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InquiryWrite'
      responses:
        '200':
          description: Inquiry updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
        '201':
          description: Inquiry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inquiry'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /integration/v1/tenants/{tenantId}/quotations/{antQuotationId}:
