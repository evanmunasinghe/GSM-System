      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotationWrite'
      responses:
        '200':
          description: Quotation updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'
        '201':
          description: Quotation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quotation'
        '409':
